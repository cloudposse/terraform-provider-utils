name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v1.32.0). Tag must already exist."
        required: true
        type: string
      make_latest:
        description: "Mark this release as 'Latest' on GitHub"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Validate tag exists
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git ls-remote --tags "${{ github.server_url }}/${{ github.repository }}" "refs/tags/${TAG}" | grep -qE "refs/tags/${TAG}$" || {
            echo "::error::Tag ${TAG} does not exist. Create it first."
            exit 1
          }

      - name: Check out code at tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PRIVATE_KEY_PASSPHRASE }}

      - name: Patch goreleaser config
        run: |
          cp .goreleaser.yml /tmp/.goreleaser-patched.yml
          sed -i 's/{{ .Env.ARCHIVES_FORMAT }}/zip/g' /tmp/.goreleaser-patched.yml

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --config /tmp/.goreleaser-patched.yml --clean --timeout 45m
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GO_RELEASER_TARGET_COMMITISH: main

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ inputs.make_latest }}" = "true" ]; then
            gh release edit "${TAG}" --draft=false --latest
          else
            gh release edit "${TAG}" --draft=false --latest=false
          fi
